<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>LSSD POI Form Generator</title>

<meta name="theme-color" content="#2E3E2B">

<style>
body {
  font-family: Arial;
  max-width: 1100px;
  margin: auto;
  background-color: #2E3E2B;
  color: #fff;
}

.section-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 25px;
  margin-bottom: 20px;
}

.card {
  border: 1px solid #ccc;
  padding: 15px;
  border-radius: 6px;
  background: #fff;
  color: #111;

  display: flex;
  flex-direction: column;
  gap: 10px;
}

.card h4 {
  margin: 0 0 5px 0;
  border-bottom: 1px solid #ddd;
  padding-bottom: 4px;
}

input:not([type="checkbox"]), textarea {
  width: 100%;
  padding: 6px;
  box-sizing: border-box;
}

/* CHECKBOX FIX */
label {
  display: flex;
  align-items: center;
  gap: 8px;
  cursor: pointer;
}

label input[type="checkbox"] {
  width: auto;
  margin: 0;
}

.card label {
  margin-bottom: 6px;
}

.header {
  display: flex;
  align-items: center;
  gap: 15px;
  margin: 20px 0 30px 0;
  padding-bottom: 10px;
  border-bottom: 2px solid #556B2F;
}

.header img {
  width: 65px;
}

button {
  margin-right: 10px;
  padding: 8px 12px;
}
</style>
</head>

<body>

<div class="header">
  <img src="sheriff.png">
  <h2>LSSD POI Form Generator</h2>
</div>

<div class="section-grid">

<div class="card">
<h4>Classification</h4>
<label><input type="checkbox" id="member"> Member</label>
<label><input type="checkbox" id="associate"> Associate</label>
<input id="gang" placeholder="Gang">
<input id="clique" placeholder="Clique">
</div>

<div class="card">
<h4>Identity</h4>
<input id="name" placeholder="Last, First, Middle">
<input id="residence" placeholder="Residence Address">
<input id="city" placeholder="City">
<input id="moniker" placeholder="Moniker">
<input id="otherAddress" placeholder="Other Address / School">
</div>

<div class="card">
<h4>Personal Info</h4>
<input id="sex" placeholder="Sex">
<input id="race" placeholder="Race">
<input id="age" placeholder="Age">
<input id="occupation" placeholder="Occupation / Work Address">
<input id="phone" placeholder="Phone">
<input id="dl" placeholder="Driver License No.">
<input id="state" placeholder="State">
</div>

</div>

<div class="section-grid">

<div class="card">
<h4>Intelligence</h4>
<input id="photo" placeholder="Photo URL">
<input id="officer" placeholder="Officer Notifying">
<input id="serial" placeholder="Serial">
<input id="date" type="date">
<textarea id="description" rows="6" placeholder="Physical Description / Misc Info"></textarea>
</div>

<div class="card">
<h4>Gang Criteria (min 2 required)</h4>

<label><input type="checkbox" id="c1"> Self Admission</label>
<label><input type="checkbox" id="c2"> Arrest for Gang Offense</label>
<label><input type="checkbox" id="c3"> Association with Members</label>
<label><input type="checkbox" id="c4"> Symbols / Hand Signs</label>
<label><input type="checkbox" id="c5"> Known Locations</label>
<label><input type="checkbox" id="c6"> Gang Dress</label>
<label><input type="checkbox" id="c7"> Tattoos</label>

</div>

<div class="card">
<h4>Administration</h4>
<input id="completingOfficer" placeholder="Completing Officer">
<input id="completingSerial" placeholder="Serial">
<input id="team" placeholder="Area & Team">
<input id="completedDate" type="date">
<input id="supervisor" placeholder="Supervisor">
<input id="supervisorSerial" placeholder="Supervisor Serial">
</div>

</div>

<br>

<button onclick="generate()">Generate</button>
<button onclick="copyOutput()">Copy</button>
<button onclick="clearForm()">Clear</button>

<h3>Output</h3>
<textarea id="output" rows="18"></textarea>

<script>

const $ = id => document.getElementById(id);

// ================= LOCAL STORAGE =================
document.querySelectorAll("input, textarea").forEach(el => {
  if (!el.id) return;

  const saved = localStorage.getItem(el.id);
  if (saved !== null) {
    if (el.type === "checkbox") el.checked = saved === "true";
    else el.value = saved;
  }

  el.addEventListener("input", () => {
    localStorage.setItem(el.id, el.type === "checkbox" ? el.checked : el.value);
  });
});

// ================= GENERATE =================
function generate() {

  const member = $("member").checked ? "X" : " ";
  const associate = $("associate").checked ? "X" : " ";

  const criteriaList = [
    ["c1","Self Admission"],
    ["c2","Arrest for Gang-Consistent Offense"],
    ["c3","Association with Documented Members"],
    ["c4","Display of Symbols or Signs"],
    ["c5","Frequenting Known Locations"],
    ["c6","Gang Dress"],
    ["c7","Gang Tattoos"]
  ];

  const criteria = criteriaList.map((c,i) => {
    const checked = $(c[0]).checked ? "X" : " ";
    return `[${checked}] [b]${i+1}.[/b] ${c[1]}`;
  }).join("\n");

  // PHOTO LOGIC
  let photoBlock = "";
  if ($("photo").value.trim() === "") {
    photoBlock = "[center][size=200][b]NO PHOTO AVAILABLE[/b][/size][/center]";
  } else {
    photoBlock = `[img]${$("photo").value}[/img]`;
  }

  const output = `
[table][tr]
[td][b]MEMBER[/b] ${member} [b]ASSOCIATE[/b] ${associate} [b]GANG:[/b] ${$("gang").value}[/td]
[td][/td]
[td][b]CLIQUE:[/b] ${$("clique").value}[/td]
[/tr][/table]

[table][tr]
[td][b]SUBJECT'S NAME:[/b] ${$("name").value}[/td]
[td][b]RESIDENCE ADDRESS:[/b] ${$("residence").value}[/td]
[td][b]CITY:[/b] ${$("city").value}[/td]
[/tr][/table]

[table][tr]
[td][b]MONIKER:[/b] ${$("moniker").value}[/td]
[td][b]OTHER ADDRESS/SCHOOL:[/b] ${$("otherAddress").value}[/td]
[/tr][/table]

[table][tr]
[td][b]SEX:[/b] ${$("sex").value}[/td]
[td][b]RACE:[/b] ${$("race").value}[/td]
[td][b]AGE:[/b] ${$("age").value}[/td]
[/tr][/table]

[table][tr]
[td][b]OCCUPATION:[/b] ${$("occupation").value}
[b]PHONE:[/b] ${$("phone").value}
[b]DL:[/b] ${$("dl").value}
[b]STATE:[/b] ${$("state").value}
[/td]
[/tr][/table]

[table][tr]
[td][b]PHOTO[/b]
${photoBlock}[/td]
[td]
[b]OFFICER:[/b] ${$("officer").value} ${$("serial").value}
[b]DATE:[/b] ${$("date").value}
[b]DESCRIPTION:[/b]
${$("description").value}
[/td]
[/tr][/table]

[table][tr]
[td][b]CRITERIA[/b]

${criteria}

[/td]
[/tr][/table]

[table][tr]
[td][b]COMPLETING OFFICER:[/b] ${$("completingOfficer").value}[/td]
[td][b]SERIAL:[/b] ${$("completingSerial").value}[/td]
[td][b]TEAM:[/b] ${$("team").value}[/td]
[td][b]DATE:[/b] ${$("completedDate").value}[/td]
[td][b]SUPERVISOR:[/b] ${$("supervisor").value}[/td]
[td][b]SERIAL:[/b] ${$("supervisorSerial").value}[/td]
[/tr][/table]
`.trim();

  $("output").value = output;
}

// ================= COPY =================
function copyOutput() {
  $("output").select();
  document.execCommand("copy");
}

// ================= CLEAR =================
function clearForm() {
  localStorage.clear();
  location.reload();
}

</script>

</body>
</html>
