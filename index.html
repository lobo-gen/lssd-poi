<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>LSSD POI Form Generator</title>

<meta property="og:title" content="LSSD POI Form Generator">
<meta property="og:description" content="Generate professional POI intelligence reports for LSSD.">
<meta property="og:type" content="website">

<meta name="theme-color" content="#2E3E2B">
<meta name="twitter:card" content="summary_large_image">

<link rel="icon" type="image/png" href="favicon.png">

<style>
body {
  font-family: Arial;
  max-width: 1100px;
  margin: auto;
  background-color: #2E3E2B;
  color: #fff;
}

.section-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
}

.card {
  border: 1px solid #ccc;
  padding: 10px;
  border-radius: 6px;
  background: #fff;
  color: #111;
}

textarea, input {
  width: 100%;
  margin-top: 5px;
}

.header {
  display: flex;
  align-items: center;
  gap: 15px;
  margin: 20px 0 30px 0;
  padding-bottom: 10px;
  border-bottom: 2px solid #556B2F;
  box-shadow: 0 4px 6px rgba(0,0,0,0.3);
}

.header img {
  width: 65px;
}

button {
  margin-right: 10px;
}
</style>
</head>

<body>

<div class="header">
  <img src="sheriff.png" alt="LSSD Logo">
  <h2>LSSD POI Form Generator</h2>
</div>

<div class="section-grid">

<!-- CLASSIFICATION -->
<div class="card">
<h4>Classification</h4>
<label><input type="checkbox" id="member"> Member</label><br>
<label><input type="checkbox" id="associate"> Associate</label><br>
<input id="gang" placeholder="Gang"><br>
<input id="clique" placeholder="Clique">
</div>

<!-- IDENTITY -->
<div class="card">
<h4>Identity</h4>
<input id="name" placeholder="Last, First, Middle">
<input id="residence" placeholder="Residence Address">
<input id="city" placeholder="City">
<input id="moniker" placeholder="Moniker">
<input id="otherAddress" placeholder="Other Address / School">
</div>

<!-- PERSONAL -->
<div class="card">
<h4>Personal Info</h4>
<input id="sex" placeholder="Sex">
<input id="race" placeholder="Race">
<input id="age" placeholder="Age">
<input id="occupation" placeholder="Occupation / Work Address">
<input id="phone" placeholder="Phone">
<input id="dl" placeholder="Driver License No.">
<input id="state" placeholder="State">
</div>

</div>

<div class="section-grid">

<!-- INTELLIGENCE -->
<div class="card">
<h4>Intelligence</h4>
<input id="photo" placeholder="Photo URL">
<input id="officer" placeholder="Officer Notifying">
<input id="serial" placeholder="Serial">
<input id="date" type="date">
<textarea id="description" rows="6" placeholder="Physical Description / Misc Info"></textarea>
</div>

<!-- CRITERIA -->
<div class="card">
<h4>Gang Criteria (min 2 required)</h4>

<label><input type="checkbox" id="c1"> Self Admission</label><br>
<label><input type="checkbox" id="c2"> Arrest for Gang Offense</label><br>
<label><input type="checkbox" id="c3"> Association with Members</label><br>
<label><input type="checkbox" id="c4"> Symbols / Hand Signs</label><br>
<label><input type="checkbox" id="c5"> Known Locations</label><br>
<label><input type="checkbox" id="c6"> Gang Dress</label><br>
<label><input type="checkbox" id="c7"> Tattoos</label><br>

</div>

<!-- ADMIN -->
<div class="card">
<h4>Administration</h4>
<input id="completingOfficer" placeholder="Completing Officer">
<input id="completingSerial" placeholder="Serial">
<input id="team" placeholder="Area & Team">
<input id="completedDate" type="date">
<input id="supervisor" placeholder="Supervisor">
<input id="supervisorSerial" placeholder="Supervisor Serial">
</div>

</div>

<br>

<button onclick="generate()">Generate</button>
<button onclick="copyOutput()">Copy</button>
<button onclick="clearForm()">Clear</button>

<h3>Output</h3>
<textarea id="output" rows="18"></textarea>

<script>

// helpers
const $ = id => document.getElementById(id);

// ---------------- GENERATE ----------------
function generate() {

  const member = $("member").checked ? "X" : " ";
  const associate = $("associate").checked ? "X" : " ";

  const gang = $("gang").value || "Type Here";
  const clique = $("clique").value || "Type Here";

  const name = $("name").value || "Type Here";
  const residence = $("residence").value || "Type Here";
  const city = $("city").value || "Type Here";
  const moniker = $("moniker").value || "Type Here";
  const otherAddress = $("otherAddress").value || "Type Here";

  const sex = $("sex").value || "Type Here";
  const race = $("race").value || "Type Here";
  const age = $("age").value || "Type Here";

  const occupation = $("occupation").value || "Type Here";
  const phone = $("phone").value || "Type Here";
  const dl = $("dl").value || "Type Here";
  const state = $("state").value || "Type Here";

  const photo = $("photo").value || "https://i.imgur.com/b4ipgJk.png";
  const officer = $("officer").value || "Type Here";
  const serial = $("serial").value || "Type Here";
  const date = $("date").value || "Type Here";
  const description = $("description").value || "Type Here";

  const criteriaList = [
    ["c1","Self Admission"],
    ["c2","Arrest for Gang-Consistent Offense"],
    ["c3","Association with Documented Members"],
    ["c4","Display of Symbols or Signs"],
    ["c5","Frequenting Known Locations"],
    ["c6","Gang Dress"],
    ["c7","Gang Tattoos"]
  ];

  const criteria = criteriaList.map((c,i) => {
    const checked = $(c[0]).checked ? "X" : " ";
    return `[${checked}] [b]${i+1}.[/b] ${c[1]}`;
  }).join("\n");

  const output = `
[table][tr]
[td][b]MEMBER[/b] ${member} [b]ASSOCIATE[/b] ${associate} [b]GANG:[/b] ${gang}[/td]
[td][/td]
[td][b]CLIQUE:[/b] ${clique}[/td]
[/tr][/table]

[table][tr]
[td][b]SUBJECT'S NAME:[/b] ${name}[/td]
[td][b]RESIDENCE ADDRESS:[/b] ${residence}[/td]
[td][b]CITY:[/b] ${city}[/td]
[/tr][/table]

[table][tr]
[td][b]MONIKER:[/b] ${moniker}[/td]
[td][b]OTHER ADDRESS/SCHOOL:[/b] ${otherAddress}[/td]
[/tr][/table]

[table][tr]
[td][b]SEX:[/b] ${sex}[/td]
[td][b]RACE:[/b] ${race}[/td]
[td][b]AGE:[/b] ${age}[/td]
[/tr][/table]

[table][tr]
[td][b]OCCUPATION:[/b] ${occupation}
[b]PHONE:[/b] ${phone}
[b]DL:[/b] ${dl}
[b]STATE:[/b] ${state}
[/td]
[/tr][/table]

[table][tr]
[td][b]PHOTO[/b]
[img]${photo}[/img][/td]
[td]
[b]OFFICER:[/b] ${officer} ${serial}
[b]DATE:[/b] ${date}
[b]DESCRIPTION:[/b]
${description}
[/td]
[/tr][/table]

[table][tr]
[td][b]CRITERIA[/b]

${criteria}

[/td]
[/tr][/table]

[table][tr]
[td][b]COMPLETING OFFICER:[/b] ${completingOfficer.value || "Type Here"}[/td]
[td][b]SERIAL:[/b] ${completingSerial.value || "Type Here"}[/td]
[td][b]TEAM:[/b] ${team.value || "Type Here"}[/td]
[td][b]DATE:[/b] ${completedDate.value || "Type Here"}[/td]
[td][b]SUPERVISOR:[/b] ${supervisor.value || "Type Here"}[/td]
[td][b]SERIAL:[/b] ${supervisorSerial.value || "Type Here"}[/td]
[/tr][/table]
`.trim();

  $("output").value = output;
}

// ---------------- COPY ----------------
function copyOutput() {
  $("output").select();
  document.execCommand("copy");
}

// ---------------- CLEAR ----------------
function clearForm() {
  location.reload();
}

</script>

</body>
</html>
